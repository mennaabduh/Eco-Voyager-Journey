      const allowOutsideDriver = true

      function shouldLoad() {
        if (allowOutsideDriver)
          return true

        return window.location.protocol === 'file:'
          || (window !== window.parent && typeof window.parent.IsLmsPresent === 'function')
      }

      function loadModule(manifest) {
        const p = []

        if (manifest['.css'] != null) {
          for (var idx = 0; idx < manifest['.css'].length; idx++) {
            p.push(new Promise((resolve, reject) => {
              var link = document.createElement('link')
              link.onload = resolve
              link.onerror = reject
              link.rel = 'stylesheet'
              link.href = 'lib/' + manifest['.css'][idx]
              document.body.appendChild(link)
            }))
          }
        }

        if (manifest['.js'] != null) {
          for (var idx = 0; idx < manifest['.js'].length; idx++) {
            p.push(new Promise((resolve, reject) => {
              var script = document.createElement('script')
              script.onload = resolve
              script.onerror = reject
              script.src = 'lib/' + manifest['.js'][idx]
              document.body.appendChild(script)
            }))
          }
        }

        return Promise.all(p)
      }

      function deserialize(str) {
        const buffer = Uint8Array.from(atob(str), c => c.charCodeAt(0))
        const json = new TextDecoder().decode(buffer)
        const result = JSON.parse(json)
        return result
      }

<script>
  document.addEventListener('click', function (event) {
    // 1. الإمساك بزر البدء عبر الرابط الفريد (Href) من الـ Inspect
    var startBtn = event.target.closest('a[href*="LoF0zyd0RYMsb-AI1i4J05mP2rwo5IWe"]');
    
    // 2. الإمساك ببقية الأزرار عبر الكلاسات العامة
    var otherBtn = event.target.closest('.continue-btn, .brand--ui, .button');

    // التحقق إذا كان العنصر المضغوط هو زر البدء أو زر يحتوي على نصوص التكملة
    if (startBtn || (otherBtn && (
        otherBtn.innerText.trim() === "Continue" || 
        otherBtn.innerText.trim() === "Let's Start" || 
        otherBtn.innerText.trim() === "متابعة"
    ))) {

      var audio = document.getElementById('clickAudio');
      if (audio) {
        audio.currentTime = 0; // إعادة الصوت للبداية مع كل ضغطة
        audio.play().catch(function (error) {
          console.log("الضغط لم يفعل الصوت، تأكدي من تفاعل المستخدم أولاً:", error);
        });
      }
    }
  }, true); // استخدام true لضمان التقاط الضغطة قبل انتقال الصفحة
</script>

  <!-- تحميل الملفات الستة مخفية -->
  <audio id="snd1" src="1.mp3" loop preload="auto"></audio>
  <audio id="snd2" src="2.mp3" loop preload="auto"></audio>
  <audio id="snd3" src="3.mp3" loop preload="auto"></audio>
  <audio id="snd4" src="4.mp3" loop preload="auto"></audio>
  <audio id="snd5" src="5.mp3" loop preload="auto"></audio>
  <audio id="snd6" src="6.mp3" loop preload="auto"></audio>

  <script>
    let activeAudio = null;

    function switchAudio(id) {
      if (activeAudio) {
        activeAudio.pause();
        activeAudio.currentTime = 0;
      }
      activeAudio = document.getElementById(id);
      if (activeAudio) {
        activeAudio.play().catch(e => console.log("تحتاج نقرة لتفعيل الصوت الجديد"));
      }
    }

    document.addEventListener('click', function (event) {
      // 1. الإمساك بالزر الأول عبر الرابط الفريد (الذي نجح سابقاً)
      var startBtn = event.target.closest('a[href*="LoF0zyd0RYMsb-AI1i4J05mP2rwo5IWe"]');

      // 2. الإمساك ببقية الأزرار عبر الكلاسات العامة
      var otherBtn = event.target.closest('button, .continue-btn, .blocks-button__button, .button');

      if (startBtn) {
        switchAudio('snd1'); // تشغيل الصوت الأول فوراً
      }
      else if (otherBtn) {
        var txt = otherBtn.innerText.trim();

        // البحث عن النصوص التي ذكرتيها لبقية الأزرار
        if (txt.includes("Explore The Waterfall!")) {
          switchAudio('snd2');
        } else if (txt.includes("Dive into Underwater Life!")) {
          switchAudio('snd3');
        } else if (txt.includes("Make a Sustainable Choice!")) {
          switchAudio('snd4');
        } else if (txt.includes("Let's Support Local!")) {
          switchAudio('snd5');
        } else if (txt.includes("Conclude Your Voyage!")) {
          switchAudio('snd6');
        }
      }
    }, true); // استخدام true لضمان الالتقاط السريع
  </script>
